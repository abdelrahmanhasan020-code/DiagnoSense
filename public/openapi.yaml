                  description: 'This field is required when <code>phone</code> is not present. Must be a valid email address. Must not be greater than 255 characters.'
                  example: kunde.eloisa@example.com
                  nullable: false
                phone:
                  type: string
                  description: 'This field is required when <code>email</code> is not present. Must be at least 10 characters. Must not be greater than 15 characters.'
                  example: hfqcoynlazghd
                  nullable: false
                age:
                  type: integer
                  description: ''
                  example: 17
                  nullable: true
                gender:
                  type: string
                  description: ''
                  example: male
                  nullable: true
                  enum:
                    - male
                    - female
                national_id:
                  type: string
                  description: 'Must not be greater than 15 characters.'
                  example: mqeopfuudtdsu
                  nullable: true
                is_smoker:
                  type: boolean
                  description: ''
                  example: false
                  nullable: true
                previous_surgeries:
                  type: boolean
                  description: ''
                  example: false
                  nullable: true
                chronic_diseases:
                  type: array
                  description: ''
                  example:
                    - consequatur
                  items:
                    type: string
                previous_surgeries_name:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: true
                medications:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: true
                allergies:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: true
                family_history:
                  type: string
                  description: ''
                  example: consequatur
                  nullable: true
                lab:
                  type: array
                  description: 'Must be a file. Must not be greater than 10240 kilobytes.'
                  items:
                    type: string
                    format: binary
                radiology:
                  type: array
                  description: 'Must be a file. Must not be greater than 10240 kilobytes.'
                  items:
                    type: string
                    format: binary
                medical_history:
                  type: array
                  description: 'Must be a file. Must not be greater than 10240 kilobytes.'
                  items:
                    type: string
                    format: binary
              required:
                - name
      security: []
